name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: pcls-build
          path: |
            dist
            package.json
            package-lock.json
            server.js
            scripts/start-node.mjs
          retention-days: 7

  deploy:
    name: Deploy over SSH
    runs-on: ubuntu-latest
    needs: build
    env:
      SSH_HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
      SSH_PORT: ${{ secrets.HOSTINGER_SSH_PORT }}
      SSH_USER: ${{ secrets.HOSTINGER_SSH_USER }}
      SSH_KEY: ${{ secrets.HOSTINGER_SSH_KEY }}
      APP_DIR: ${{ secrets.HOSTINGER_APP_DIR }}
      RESTART_COMMAND: ${{ secrets.HOSTINGER_RESTART_COMMAND }}

    steps:
      - name: Check SSH deployment secrets
        id: check
        run: |
          if [ -n "$SSH_HOST" ] && [ -n "$SSH_USER" ] && [ -n "$APP_DIR" ] && [ -n "$SSH_KEY" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "SSH deployment secrets are not configured. Build completed; deploy skipped."
          fi

      - name: Checkout
        if: steps.check.outputs.configured == 'true'
        uses: actions/checkout@v4

      - name: Download build artifact
        if: steps.check.outputs.configured == 'true'
        uses: actions/download-artifact@v4
        with:
          name: pcls-build
          path: .

      - name: Setup SSH key
        if: steps.check.outputs.configured == 'true'
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/hostinger_key
          chmod 600 ~/.ssh/hostinger_key
          ssh-keyscan -p "${SSH_PORT:-22}" "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Sync files to server
        if: steps.check.outputs.configured == 'true'
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/hostinger_key -p ${SSH_PORT:-22}" \
            --exclude ".git" \
            --exclude ".github" \
            --exclude ".env" \
            --exclude ".env.*" \
            --exclude "node_modules" \
            --exclude "dist.zip" \
            ./ "$SSH_USER@$SSH_HOST:$APP_DIR/"

      - name: Install production dependencies and restart
        if: steps.check.outputs.configured == 'true'
        run: |
          restart="${RESTART_COMMAND:-pm2 restart pcls || pm2 start server.js --name pcls}"
          ssh -i ~/.ssh/hostinger_key -p "${SSH_PORT:-22}" \
            "$SSH_USER@$SSH_HOST" \
            "cd '$APP_DIR' && npm ci --omit=dev && ($restart)"
